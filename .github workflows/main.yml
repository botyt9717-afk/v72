name: 🤖 BELAL BOTX666

on:
  workflow_dispatch:

jobs:
  run-bot:
    name: 🚀 বট চালু করা
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 কোড ডাউনলোড
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔧 FFmpeg ইন্সটল
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip

      - name: 📦 Dependencies ইন্সটল
        run: npm install --legacy-peer-deps
        env:
          NODE_ENV: production

      - name: 🔑 Appstate সেটআপ
        run: |
          echo "Setup appstate later"

      - name: 🤖 বট চালু
        run: echo "Bot testing setup"
        
