name: 🤖 BELAL BOTX666

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    name: 🚀 বট চালু করা
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 কোড ডাউনলোড
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 20 সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔧 FFmpeg ইন্সটল
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip

      - name: 📦 Dependencies ইন্সটল
        run: npm install --legacy-peer-deps
        env:
          NODE_ENV: production

      - name: 🔑 Appstate সেটআপ
        run: |
          echo '${{ secrets.APPSTATE }}' > appstate.json
          echo "✅ appstate.json তৈরি হয়েছে"

      - name: 🤖 বট চালু
        run: node index.js
        env:
          NODE_ENV: production
          TZ: Asia/Dhaka
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_WEATHER_KEY: ${{ secrets.OPEN_WEATHER_KEY }}
          REMOVEBG_KEY: ${{ secrets.REMOVEBG_KEY }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}

