name: BELALBOT

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Download Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup AppState
        run: echo '${{ secrets.APPSTATE }}' > appstate.json

      - name: Install Package
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - name: Start Bot
        run: npm start
        env:
          NODE_ENV: production
          TZ: Asia/Dhaka
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
