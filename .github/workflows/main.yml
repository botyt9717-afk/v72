name: BELAL-BOTX666

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    name: Run Messenger Bot
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Setup AppState
        run: |
          echo '${{ secrets.APPSTATE }}' > appstate.json
          echo "✅ appstate.json created successfully!"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - name: Run Validator
        run: node utils/validator.js || echo "Warning but continuing"

      - name: Start BELAL BOTX666
        run: npm start
        timeout-minutes: 350
        env:
          NODE_ENV: production
          TZ: Asia/Dhaka
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
