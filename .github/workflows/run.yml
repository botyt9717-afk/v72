name: 🤖 BELAL BOTX666 — Run Bot

on:
  workflow_dispatch:
    inputs:
      action:
        description: "কী করতে চাও?"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - restart
          - check
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ১. Code checkout
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "📥 Code ডাউনলোড হচ্ছে..."
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ২. Node.js সেটআপ
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "⚙️ Node.js ${{ matrix.node-version }} সেটআপ হচ্ছে..."
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৩. System tools ইনস্টল
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "🔧 System tools ইনস্টল হচ্ছে..."
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          echo "✅ System tools ইনস্টল সফল!"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৪. AppState সেটআপ
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "🔐 AppState সেটআপ হচ্ছে..."
        run: |
          echo '${{ secrets.APPSTATE }}' > appstate.json
          echo "✅ AppState সেটআপ সফল!"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৫. Config সেটআপ (secrets থেকে)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "⚙️ Config API Keys সেটআপ হচ্ছে..."
        run: |
          node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('config.json', 'utf-8'));
          config.APIKEYS.GROQ = process.env.GROQ_KEY || config.APIKEYS.GROQ;
          config.APIKEYS.GEMINI = process.env.GEMINI_KEY || config.APIKEYS.GEMINI;
          config.APIKEYS.OPENAI = process.env.OPENAI_KEY || config.APIKEYS.OPENAI;
          config.APIKEYS.OPEN_WEATHER = process.env.WEATHER_KEY || config.APIKEYS.OPEN_WEATHER;
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          console.log('✅ Config API Keys সেটআপ সফল!');
          "
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৬. Dependencies ইনস্টল
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "📦 Dependencies ইনস্টল হচ্ছে..."
        run: |
          npm install --legacy-peer-deps --no-fund --no-audit
          echo "✅ Dependencies ইনস্টল সফল!"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৭. Validator চেক
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "🔍 ফাইল Validator চেক হচ্ছে..."
        run: |
          node utils/validator.js || echo "⚠️ Validator warning — তবুও চালু হচ্ছে"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      # ৮. Bot চালু
      # ━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: "🚀 BELAL BOTX666 চালু হচ্ছে..."
        run: npm start
        timeout-minutes: 350
        env:
          NODE_ENV: production
          TZ: Asia/Dhaka
          
